- name: Sync VPN 1
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Sync
        shell: python
        run: |
          import requests, datetime
          sources = [
              ("https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt", 6),
              ("https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt", 6),
              ("https://shz.al/~WangCai", 0)
          ]
          nodes = []
          for url, skip in sources:
              r = requests.get(url)
              if r.status_code == 200:
                  nodes.extend([l for l in r.text.splitlines()[skip:] if l.startswith("vless://")])
          
          flag_map = {"us": "🇺🇸", "de": "🇩🇪", "nl": "🇳🇱", "sg": "🇸🇬", "jp": "🇯🇵", "gb": "🇬🇧", "ca": "🇨🇦", "ch": "🇨🇭", "fr": "🇫🇷", "ru": "🇷🇺", "fi": "🇫🇮", "se": "🇸🇪"}
          final = []
          for i, n in enumerate(list(dict.fromkeys(nodes))[:200]):
              raw_name = n.split('#')[-1].lower()
              flag = next((f for country, f in flag_map.items() if country in raw_name), "🌐")
              clean_n = n.split('#')[0].strip()
              final.append(f"{clean_n}#{flag} VPN 1 | #{i+1}")
          
          header = f"# profile-title: VPN #1 (VLESS)\n# profile-update-interval: 1\n# last-update: {datetime.datetime.now().strftime('%d.%m.%H')}\n# кол-во: {len(final)}\n"
          with open("blacklist_vpn1.txt", "w", encoding="utf-8") as f: f.write(header + "\n" + "\n".join(final))
      - name: Push
        run: |
          git config user.name "GitHub Actions"; git config user.email "actions@github.com"
          git add blacklist_vpn1.txt; git commit -m "sync: vpn1" || exit 0; git push