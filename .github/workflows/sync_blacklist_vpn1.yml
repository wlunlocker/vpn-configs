name: Sync VPN 1
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Sync
        shell: python
        run: |
          import requests, datetime
          sources = [
              ("https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt", 6),
              ("https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt", 6),
              ("https://shz.al/~WangCai", 0)
          ]
          nodes = []
          for url, skip in sources:
              try:
                  r = requests.get(url, timeout=15)
                  if r.status_code == 200:
                      nodes.extend([l for l in r.text.splitlines()[skip:] if l.startswith("vless://")])
              except: continue
          
          # Настройка: код -> [эмодзи_флаг, русское_название]
          mapping = {
              "us": ["🇺🇸", "США"], "de": ["🇩🇪", "Германия"], "nl": ["🇳🇱", "Нидерланды"], 
              "sg": ["🇸🇬", "Сингапур"], "jp": ["🇯🇵", "Япония"], "gb": ["🇬🇧", "Великобритания"], 
              "ca": ["🇨🇦", "Канада"], "ch": ["🇨🇭", "Швейцария"], "fr": ["🇫🇷", "Франция"], 
              "ru": ["🇷🇺", "Россия"], "fi": ["🇫🇮", "Финляндия"], "se": ["🇸🇪", "Швеция"]
          }
          
          final = []
          for i, n in enumerate(list(dict.fromkeys(nodes))[:200]):
              raw = n.split('#')[-1].lower()
              code = next((c for c in mapping if c in raw), None)
              flag, name = mapping.get(code, ["🌐", "Мир"])
              final.append(f"{n.split('#')[0].strip()}#{flag} 🏴 WLUnlocker {name} | #{i+1}")
          
          header = f"# profile-title: VPN 1\n# last-update: {datetime.datetime.now().strftime('%d.%m.%H')}\n# count: {len(final)}\n"
          with open("blacklist_vpn1.txt", "w", encoding="utf-8") as f: f.write(header + "\n".join(final))
      - name: Push Changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add blacklist_vpn1.txt
          git commit -m "sync: vpn1" || echo "No changes"
          git pull --rebase origin main
          git push origin main --force-with-lease