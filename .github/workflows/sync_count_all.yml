name: Update README Counters
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse Subscriptions and Update README
        shell: python
        run: |
          import re
          
          def get_count(filename):
              try:
                  with open(filename, 'r', encoding='utf-8') as f:
                      content = f.read()
                      
                      match = re.search(r'#\s*(?:count|кол-во|кол-во серверов):\s*(\d+)', content, re.IGNORECASE)
                      if match:
                          return match.group(1)
                      
                      lines = content.splitlines()
                      valid_nodes = [l for l in lines if l.strip().startswith(('vless://', 'ss://', 'hysteria2://', 'trojan://', 'shadowsocks://'))]
                      if valid_nodes:
                          return str(len(valid_nodes))
              except:
                  pass
              return "0"

          counts = {
              "whitelist_all": get_count("whitelist_all.txt"),
              "blacklist_all": get_count("blacklist_all.txt"),
              "whitelist_cidr1": get_count("whitelist_cidr1_ru.txt"),
              "whitelist_cidr2": get_count("whitelist_cidr2_ru.txt"),
              "whitelist_cidr3": get_count("whitelist_cidr3_eu.txt"),
              "blacklist_vpn1": get_count("blacklist_vpn1.txt"),
              "blacklist_vpn2": get_count("blacklist_vpn2.txt"),
              "filtered_vpn": get_count("filtered_vpn.txt")
          }

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = r"()(.*?)()"
          match = re.search(pattern, readme, re.DOTALL)

          if match:
              table_content = match.group(2)
              
              for key, val in counts.items():
                  table_content = re.sub(r'(\*\*Серверов:\*\*|\*\*Servers:\*\*)\s*(\{\s*' + key + r'\s*\}|\d+)', f'\\1 {val}', table_content)

              new_readme = readme[:match.start(2)] + table_content + readme[match.end(2):]
              
              with open("README.md", "w", encoding="utf-8") as f:
                  f.write(new_readme)

      - name: Push Changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "docs: auto-update server counters in README" || echo "No changes"
          git pull --rebase origin main
          git push origin main --force-with-lease
