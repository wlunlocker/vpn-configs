name: WLUnlocker Filter Only Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Filtered Sync
        shell: python
        run: |
          import urllib.request
          import re
          import os

          COUNTRIES = {
              "FR": ("🇫🇷", "Франция", "FRANCE"),
              "DE": ("🇩🇪", "Германия", "GERMANY"),
              "NL": ("🇳🇱", "Нидерланды", "NETHERLANDS"),
              "PL": ("🇵🇱", "Польша", "POLAND"),
              "GB": ("🇬🇧", "Англия", "UNITED KINGDOM"),
              "US": ("🇺🇸", "Америка", "USA"),
              "EE": ("🇪🇪", "Эстония", "ЭСТОНИЯ"),
              "FI": ("🇫🇮", "Финляндия", "FINLAND"),
              "CA": ("🇨🇦", "Канада", "CANADA"),
              "IE": ("🇮🇪", "Ирландия", "IRELAND"),
              "RO": ("🇷🇴", "Румыния", "ROMANIA"),
              "AT": ("🇦🇹", "Австрия", "AUSTRIA"),
              "CH": ("🇨🇭", "Швейцария", "SWITZERLAND"),
              "KZ": ("🇰🇿", "Казахстан", "KAZAKHSTAN"),
              "JP": ("🇯🇵", "Япония", "JAPAN"),
              "SE": ("🇸🇪", "Швеция", "SWEDEN"),
              "TR": ("🇹🇷", "Турция", "TURKEY"),
              "SG": ("🇸🇬", "Сингапур", "SINGAPORE")
          }

          def get_data(url):
              collected = []
              try:
                  headers = {'User-Agent': 'Mozilla/5.0'}
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as response:
                      lines = response.read().decode('utf-8').splitlines()
                      for l in lines:
                          if '#' in l and not l.startswith('//'):
                              collected.append(l)
              except: pass
              return collected

          urls_black = [
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt",
              "https://shz.al/~WangCai"
          ]
          urls_white = [
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
          ]

          all_configs = []

          for source_list, type_flag in [(urls_black, "🏴"), (urls_white, "🏳️")]:
              for url in source_list:
                  for item in get_data(url):
                      try:
                          link, name = item.split('#', 1)
                          name_up = name.upper()
                          for code, info in COUNTRIES.items():
                              if code in name_up or info[1].upper() in name_up or info[2] in name_up:
                                  all_configs.append({
                                      'link': link, 'code': code, 'type_flag': type_flag
                                  })
                                  break
                      except: pass

          seen = set()
          final_lines = []

          for c in all_configs:
              key = (c['code'], c['type_flag'])
              if key not in seen:
                  seen.add(key)
                  flag_emoji, rus_name, _ = COUNTRIES[c['code']]
                  line = f"{c['link']}#{flag_emoji} {c['type_flag']} WLUnlocker {rus_name}"
                  final_lines.append(line)
              if len(final_lines) >= 50: break

          with open("filtered.txt", "w", encoding="utf-8") as f:
              f.write("# profile-title: 🏳️ WLUnlocker | ВСЕ 🏴\n# profile-update-interval: 1\n\n")
              f.write("\n".join(final_lines))

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add filtered.txt
          git commit -m "sync: cleaned code and removed lightnings" || exit 0
          git push
