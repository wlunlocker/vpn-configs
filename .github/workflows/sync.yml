name: WLUnlocker Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Sync Script
        shell: python
        run: |
          import urllib.request, re, os
          from datetime import datetime
          os.system('pip install pytz')
          import pytz

          COUNTRIES = {
              "RU": ("🇷🇺", "Russia"), "US": ("🇺🇸", "USA"), "DE": ("🇩🇪", "Germany"), "NL": ("🇳🇱", "Netherlands"),
              "GB": ("🇬🇧", "United Kingdom"), "FI": ("🇫🇮", "Finland"), "PL": ("🇵🇱", "Poland"), "FR": ("🇫🇷", "France"),
              "IE": ("🇮🇪", "Ireland"), "AT": ("🇦🇹", "Austria"), "CH": ("🇨🇭", "Switzerland"), "KZ": ("🇰🇿", "Kazakhstan"),
              "JP": ("🇯🇵", "Japan"), "RO": ("🇷🇴", "Romania"), "EE": ("🇪🇪", "Estonia"), "CA": ("🇨🇦", "Canada")
          }
          FILTERED_LIST = ["FR", "DE", "NL", "PL", "GB", "US", "EE", "FI", "CA", "IE", "RO", "AT", "CH", "KZ", "JP"]

          def get_data_ranged(url, start_line, end_line):
              collected = []
              try:
                  headers = {'User-Agent': 'Mozilla/5.0'}
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as response:
                      lines = response.read().decode('utf-8').splitlines()
                      for l in lines[start_line-1:end_line]:
                          if '#' in l and not l.startswith('//'): collected.append(l)
              except: pass
              return collected

          def get_country_code(name):
              name_up = name.upper()
              for code, (flag, full) in COUNTRIES.items():
                  if code in name_up or full.upper() in name_up: return code
              return None

          def format_and_save(raw_list, filename, profile_title):
              tz = pytz.timezone('Europe/Moscow')
              now = datetime.now(tz).strftime('%d.%m.%Y %H:%M MSK')
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(f"# profile-title: {profile_title}\n# profile-update-interval: 1\n# Last update: {now}\n\n")
                  counts = {}
                  for item in raw_list:
                      try:
                          link, name = item.split('#', 1)
                          code = get_country_code(name)
                          if not code: continue
                          flag, full = COUNTRIES[code]
                          num = counts.get(code, 1)
                          f.write(f"{link}#{flag} WLUnlocker {full} {num}\n")
                          counts[code] = num + 1
                      except: continue

          urls = {
              "vmob": "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt",
              "vfull": "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt",
              "wang": "https://shz.al/~WangCai",
              "sni": "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt",
              "cchk": "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt"
          }

          format_and_save(get_data_ranged(urls['sni'], 7, 999), "awlone.txt", "🏳️ГЛУШИЛКИ #1 (ВСЕ СЕРВЕРА)🏳️")
          format_and_save(get_data_ranged(urls['cchk'], 7, 999), "awltwo.txt", "🏳️ГЛУШИЛКИ #2🏳️")
          format_and_save(get_data_ranged(urls['vfull'], 7, 999), "vpnfull.txt", "🏴VPN #1 (ВСЕ СЕРВЕРА)🏴")
          format_and_save(get_data_ranged(urls['vmob'], 7, 999) + get_data_ranged(urls['wang'], 1, 999), "vpnsecond.txt", "🏴VPN #2🏴")
          
          final_f = []
          found_countries = set()
          for item in get_data_ranged(urls['vmob'], 7, 999) + get_data_ranged(urls['sni'], 7, 999):
              if len(final_f) >= len(FILTERED_LIST): break
              link, name = item.split('#', 1)
              code = get_country_code(name)
              if code in FILTERED_LIST and code not in found_countries:
                  flag, full = COUNTRIES[code]
                  type_f = "🏴" if "VLESS" in name.upper() else "🏳️"
                  final_f.append(f"{link}#{flag} {type_f} WLUnlocker {full}")
                  found_countries.add(code)

          with open("filtered.txt", "w", encoding="utf-8") as f:
              f.write("# profile-title: 🏳️СТАБИЛЬНАЯ🏴\n# profile-update-interval: 1\n\n" + "\n".join(final_f))

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "sync: fixed filtered.txt to exactly one server per requested country" || exit 0
          git push
