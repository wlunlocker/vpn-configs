name: VPN Sync Elite
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Sync Script
        shell: python
        run: |
          import urllib.request
          import re
          from datetime import datetime
          import os

          os.system('pip install pytz')
          import pytz

          COUNTRIES = {
              "RU": "🇷🇺", "US": "🇺🇸", "DE": "🇩🇪", "NL": "🇳🇱", 
              "GB": "🇬🇧", "FI": "🇫🇮", "TR": "🇹🇷", "KZ": "🇰🇿",
              "BY": "🇧🇾", "AE": "🇦🇪", "PL": "🇵🇱", "FR": "🇫🇷"
          }

          def get_data(urls, start_line, end_line):
              collected = []
              for url in urls:
                  try:
                      headers = {'User-Agent': 'Mozilla/5.0'}
                      req = urllib.request.Request(url, headers=headers)
                      with urllib.request.urlopen(req) as response:
                          lines = response.read().decode('utf-8').splitlines()
                          chunk = lines[start_line-1:end_line]
                          for l in chunk:
                              if '#' in l and not l.startswith('//'):
                                  collected.append(l)
                  except:
                      continue
              return collected

          def format_and_save(raw_list, filename, profile_title):
              tz = pytz.timezone('Europe/Moscow')
              now = datetime.now(tz).strftime('%d.%m.%Y %H:%M MSK')
              final_configs = []
              seen_links = set()
              for item in raw_list:
                  link, name = item.split('#', 1)
                  if link in seen_links: continue
                  found_code = None
                  for code in COUNTRIES:
                      if code.lower() in name.lower():
                          found_code = code
                          break
                  if found_code:
                      seen_links.add(link)
                      final_configs.append({'link': link, 'code': found_code})
              final_configs.sort(key=lambda x: (x['code'] != 'RU', x['code']))
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(f"# profile-title: {profile_title}\n")
                  f.write(f"# profile-update-interval: 1\n")
                  f.write(f"# Last update: {now}\n\n")
                  counts = {}
                  for c in final_configs:
                      flag = COUNTRIES[c['code']]
                      num = counts.get(c['code'], 1)
                      f.write(f"{c['link']}#{flag} WLUnlocker {c['code']} | {num}\n")
                      counts[c['code']] = num + 1

          LTE_URLS = [
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_SS+All_RUS.txt"
          ]
          WIFI_URLS = [
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_SS+All_RUS.txt",
              "https://shz.al/~WangCai"
          ]

          stable_data = get_data(LTE_URLS, 7, 81)
          format_and_save(stable_data, "vpnstable.txt", "🏴 WL Stable")

          full_data = get_data(WIFI_URLS, 7, 106)
          format_and_save(full_data, "vpnfull.txt", "🏴 WL Full")

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "sync: 3h schedule update" || exit 0
          git push
