name: WLUnlocker Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Sync Script
        shell: python
        run: |
          import urllib.request
          import re
          from datetime import datetime
          import os

          os.system('pip install pytz')
          import pytz

          COUNTRIES = {
              "RU": ("🇷🇺", "Russia"), "US": ("🇺🇸", "USA"), "DE": ("🇩🇪", "Germany"), "NL": ("🇳🇱", "Netherlands"),
              "GB": ("🇬🇧", "United Kingdom"), "FI": ("🇫🇮", "Finland"), "PL": ("🇵🇱", "Poland"), "FR": ("🇫🇷", "France"),
              "IE": ("🇮🇪", "Ireland"), "AT": ("🇦🇹", "Austria"), "CH": ("🇨🇭", "Switzerland"), "KZ": ("🇰🇿", "Kazakhstan"),
              "JP": ("🇯🇵", "Japan"), "RO": ("🇷🇴", "Romania"), "EE": ("🇪🇪", "Estonia"), "CA": ("🇨🇦", "Canada")
          }

          def get_data_ranged(url, start_line, end_line):
              collected = []
              try:
                  headers = {'User-Agent': 'Mozilla/5.0'}
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as response:
                      lines = response.read().decode('utf-8').splitlines()
                      chunk = lines[start_line-1:end_line]
                      for l in chunk:
                          if '#' in l and not l.startswith('//'):
                              collected.append(l)
              except: pass
              return collected

          def get_country_code(name):
              name_clean = name.upper()
              for code in COUNTRIES:
                  if re.search(rf'\b{code}\b', name_clean): return code
              return None

          def format_and_save(raw_list, filename, profile_title, flag_icon):
              tz = pytz.timezone('Europe/Moscow')
              now = datetime.now(tz).strftime('%d.%m.%Y %H:%M MSK')
              final_configs = []
              seen_links = set()
              for item in raw_list:
                  try:
                      link, name = item.split('#', 1)
                      if link in seen_links: continue
                      found_code = get_country_code(name)
                      if not found_code: continue
                      seen_links.add(link)
                      final_configs.append({'link': link, 'code': found_code})
                  except: continue
              
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(f"# profile-title: {profile_title}\n# profile-update-interval: 1\n# Last update: {now}\n\n")
                  counts = {}
                  for c in final_configs:
                      flag, full_name = COUNTRIES[c['code']]
                      num = counts.get(c['code'], 1)
                      f.write(f"{c['link']}#{flag} WLUnlocker {full_name} {num}\n")
                      counts[c['code']] = num + 1

          def format_and_save_filtered(list_black, list_white, filename, profile_title):
              tz = pytz.timezone('Europe/Moscow')
              now = datetime.now(tz).strftime('%d.%m.%Y %H:%M MSK')
              final_configs = []
              seen_links = set()
              added = set()
              
              for items, type_flag in [(list_black, "🏴"), (list_white, "🏳️")]:
                  for item in items:
                      if len(final_configs) >= 30: break
                      try:
                          link, name = item.split('#', 1)
                          if link in seen_links: continue
                          found_code = get_country_code(name)
                          if found_code not in COUNTRIES: continue
                          
                          key = (found_code, type_flag)
                          if key not in added:
                              seen_links.add(link)
                              added.add(key)
                              flag, full_name = COUNTRIES[found_code]
                              final_configs.append(f"{link}#{flag} {type_flag} WLUnlocker {full_name}")
                      except: continue

              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(f"# profile-title: {profile_title}\n# profile-update-interval: 1\n# Last update: {now}\n\n")
                  for cfg in final_configs: f.write(f"{cfg}\n")

          urls = {
              "vmob": "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt",
              "vfull": "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt",
              "wang": "https://shz.al/~WangCai",
              "sni": "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt",
              "cchk": "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt",
              "call": "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
          }
          
          format_and_save(get_data_ranged(urls['sni'], 7, 999), "awlone.txt", "🏳️ГЛУШИЛКИ #1 (ВСЕ СЕРВЕРА)🏳️", "🏳️")
          format_and_save(get_data_ranged(urls['cchk'], 7, 999), "awltwo.txt", "🏳️ГЛУШИЛКИ #2🏳️", "🏳️")
          format_and_save(get_data_ranged(urls['vfull'], 7, 999), "vpnfull.txt", "🏴VPN #1 (ВСЕ СЕРВЕРА)🏴", "🏴")
          format_and_save(get_data_ranged(urls['vmob'], 7, 999) + get_data_ranged(urls['wang'], 1, 999), "vpnsecond.txt", "🏴VPN #2🏴", "🏴")
          format_and_save_filtered(get_data_ranged(urls['vmob'], 7, 999) + get_data_ranged(urls['vfull'], 7, 999), get_data_ranged(urls['sni'], 7, 999), "filtered.txt", "🏳️СТАБИЛЬНАЯ🏴")

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "sync: updated naming logic and filtered subscription" || exit 0
          git push
