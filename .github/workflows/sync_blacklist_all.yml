name: Sync Blacklist All
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Sync
        shell: python
        run: |
          import requests
          import re

          sources = [
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt",
              "https://shz.al/~WangCai"
          ]
          limited_source = "https://raw.githubusercontent.com/nikita29a/FreeProxyList/refs/heads/main/mirror/1.txt"

          raw_nodes = []

          def clean_node(line):
              l = line.strip()
              if not l: return None
              if any(l.startswith(p) for p in ["vless://", "vmess://", "trojan://", "ss://"]):
                  return l
              return None

          for src in sources:
              try:
                  r = requests.get(src, timeout=15)
                  if r.status_code == 200:
                      for line in r.text.splitlines():
                          node = clean_node(line)
                          if node: raw_nodes.append(node)
              except: pass

          try:
              r = requests.get(limited_source, timeout=20)
              if r.status_code == 200:
                  count = 0
                  for line in r.text.splitlines():
                      if count >= 500: break
                      node = clean_node(line)
                      if node:
                          raw_nodes.append(node)
                          count += 1
          except: pass

          def format_canon(link):
              try:
                  base_part = link.split('#')[0].strip()
                  lower_link = link.lower()
                  flag = "🏴"
                  country = "Зарубежный"
                  
                  if "de" in lower_link or "germany" in lower_link or "неме" in lower_link:
                      flag, country = "🇩🇪", "Германия"
                  elif "nl" in lower_link or "netherlands" in lower_link or "нидер" in lower_link:
                      flag, country = "🇳🇱", "Нидерланды"
                  elif "fi" in lower_link or "finland" in lower_link or "финл" in lower_link:
                      flag, country = "🇫🇮", "Финляндия"
                      
                  return f"{base_part}#{flag} WLUnlocker {country}"
              except:
                  return link

          seen = set()
          final_nodes = []
          for node in raw_nodes:
              base = node.split('#')[0].strip()
              if base not in seen:
                  seen.add(base)
                  final_nodes.append(format_canon(node))

          if not final_nodes:
              exit(1)

          with open("blacklist_all.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(final_nodes))

      - name: Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add blacklist_all.txt
          git commit -m "sync: blacklist_all.txt updated" || exit 0
          git push
