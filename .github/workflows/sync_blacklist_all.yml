name: Sync Blacklist All
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Sync
        shell: python
        run: |
          import requests
          import re
          from collections import defaultdict
          from datetime import datetime

          timestamp = datetime.now().strftime("%d.%m.%H")
          
          sources = [
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt",
              "https://shz.al/~WangCai"
          ]
          limited_source = "https://raw.githubusercontent.com/nikita29a/FreeProxyList/refs/heads/main/mirror/1.txt"

          raw_nodes = []
          for src in sources:
              try:
                  r = requests.get(src, timeout=15)
                  if r.status_code == 200:
                      for line in r.text.splitlines():
                          l = line.strip()
                          if any(l.startswith(p) for p in ["vless://", "vmess://", "trojan://", "ss://"]):
                              raw_nodes.append(l)
              except: pass

          try:
              r = requests.get(limited_source, timeout=20)
              if r.status_code == 200:
                  count = 0
                  for line in r.text.splitlines():
                      if count >= 500: break
                      l = line.strip()
                      if any(l.startswith(p) for p in ["vless://", "vmess://", "trojan://", "ss://"]):
                          raw_nodes.append(l)
                          count += 1
          except: pass

          countries_db = {
              "ru": ("🇷🇺", "Россия"), "de": ("🇩🇪", "Германия"), "nl": ("🇳🇱", "Нидерланды"), "fi": ("🇫🇮", "Финляндия"), 
              "us": ("🇺🇸", "США"), "fr": ("🇫🇷", "Франция"), "gb": ("🇬🇧", "Великобритания"), "uk": ("🇬🇧", "Великобритания"),
              "sg": ("🇸🇬", "Сингапур"), "jp": ("🇯🇵", "Япония"), "hk": ("🇭🇰", "Гонконг"), "tr": ("🇹🇷", "Турция"), 
              "pl": ("🇵🇱", "Польша"), "ua": ("🇺🇦", "Украина"), "kz": ("🇰🇿", "Казахстан"), "se": ("🇸🇪", "Швеция"), 
              "ch": ("🇨🇭", "Швейцария"), "it": ("🇮🇹", "Италия"), "es": ("🇪🇸", "Испания"), "ca": ("🇨🇦", "Канада"), 
              "au": ("🇦🇺", "Австралия"), "at": ("🇦🇹", "Австрия"), "cz": ("🇨🇿", "Чехия"), "bg": ("🇧🇬", "Болгария"), 
              "ro": ("🇷🇴", "Румыния"), "hu": ("🇭🇺", "Венгрия"), "ee": ("🇪🇪", "Эстония"), "lv": ("🇱🇻", "Латвия"), 
              "lt": ("🇱🇹", "Литва"), "kr": ("🇰🇷", "Южная Корея"), "in": ("🇮🇳", "Индия"), "br": ("🇧🇷", "Бразилия"), 
              "ae": ("🇦🇪", "ОАЭ"), "cy": ("🇨🇾", "Кипр"), "ge": ("🇬🇪", "Грузия"), "md": ("🇲🇩", "Молдова")
          }

          seen_urls = set()
          grouped = defaultdict(list)
          for node in raw_nodes:
              base = node.split('#')[0].strip()
              if base in seen_urls: continue
              
              lower_link = node.lower()
              c_flag, c_name = None, None
              for code, data in countries_db.items():
                  if re.search(rf"\b{code}\b|{data[1].lower()[:4]}", lower_link):
                      c_flag, c_name = data[0], data[1]; break
              
              if c_name:
                  seen_urls.add(base)
                  grouped[c_name].append((base, c_flag))

          total_count = sum(len(nodes) for nodes in grouped.values())
          header = f"# profile-title: Blacklist All\n# profile-update-interval: 1\n# last-update: {timestamp}\n# кол-во: {total_count}\n\n"
          final = [header]
          for country in sorted(grouped.keys()):
              for i, (base, flag) in enumerate(grouped[country], 1):
                  final.append(f"{base}#{flag} 🏴 WLUnlocker {country} | #{i}")

          with open("blacklist_all.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(final))

      - name: Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add blacklist_all.txt
          git commit -m "sync" || exit 0
          git push
