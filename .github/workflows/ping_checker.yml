name: WLUnlocker Node Ping Checker
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

jobs:
  check-nodes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean Dead Nodes via TCP Check
        shell: python
        run: |
          import os
          import re
          import socket
          from datetime import datetime

          try:
              os.system('pip install pytz')
              import pytz
              tz = pytz.timezone('Europe/Moscow')
          except:
              tz = None

          FILE_PATH = "filtered.txt"

          def check_tcp_alive(link, timeout=2.5):
              try:
                  clean_link = link.split('#')[0].strip()
                  parts = clean_link.split("://")
                  if len(parts) < 2: 
                      return True
                  
                  main_part = parts[1].split("@")[-1]
                  main_part = re.split(r'[/?#]', main_part)[0]
                  
                  if "]" in main_part:
                      host, port = main_part.split("]:")
                      host = host.replace("[", "")
                  else:
                      host, port = main_part.split(":")
                      
                  with socket.create_connection((host, int(port)), timeout=timeout):
                      return True
              except:
                  return False

          if not os.path.exists(FILE_PATH):
              exit(0)

          with open(FILE_PATH, "r", encoding="utf-8") as f:
              lines = f.readlines()

          header_lines = []
          config_lines = []

          for line in lines:
              strip_line = line.strip()
              if not strip_line:
                  continue
              if strip_line.startswith("#"):
                  if "Last update:" in strip_line:
                      continue
                  header_lines.append(strip_line)
              else:
                  config_lines.append(line)

          alive_configs = []
          dead_count = 0

          for item in config_lines:
              link = item.split('#', 1)[0].strip()
              if check_tcp_alive(link):
                  alive_configs.append(item.strip())
              else:
                  dead_count += 1

          if dead_count == 0:
              exit(0)

          if tz:
              now = datetime.now(tz).strftime('%d.%m.%Y %H:%M MSK')
          else:
              now = datetime.now().strftime('%d.%m.%Y %H:%M UTC')

          with open(FILE_PATH, "w", encoding="utf-8") as f:
              for header in header_lines:
                  f.write(f"{header}\n")
              f.write(f"# Last update: {now} (Фильтрация мертвых узлов)\n\n")
              f.write("\n".join(alive_configs))

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add filtered.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "cron: очистка недоступных серверов (Н/Д)" && git push)
