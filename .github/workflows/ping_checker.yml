name: WLUnlocker Strict 15-Min Checker
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *' # Запуск каждые 15 минут

permissions:
  contents: write

jobs:
  check-nodes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Existing Nodes with Timeout
        shell: python
        run: |
          import os
          import socket
          import re
          import time
          from datetime import datetime

          os.system('pip install pytz')
          import pytz

          FILE_NAME = "filtered.txt"

          if not os.path.exists(FILE_NAME):
              print("Файл не найден, пропускаем.")
              exit(0)

          def check_node_ping(link):
              try:
                  # Очищаем ссылку от комментариев для извлечения хоста и порта
                  clean_link = link.split('#')[0].strip()
                  parts = clean_link.split("://")
                  if len(parts) < 2: 
                      return False
                      
                  main_part = parts[1].split("@")[-1]
                  main_part = re.split(r'[/?#]', main_part)[0]
                  
                  if "]" in main_part:
                      host, port = main_part.split("]:")
                      host = host.replace("[", "")
                  else:
                      host, port = main_part.split(":")
                  
                  port = int(port)
                  
                  # Измеряем скорость TCP-коннекта
                  start_time = time.time()
                  with socket.create_connection((host, port), timeout=1.0):
                      ping_ms = (time.time() - start_time) * 1000
                      if ping_ms < 1000:
                          return True
              except:
                  return False
              return False

          metadata = []
          nodes = []
          
          with open(FILE_NAME, "r", encoding="utf-8") as f:
              for line in f:
                  line_stripped = line.strip()
                  if not line_stripped: 
                      continue
                  if line_stripped.startswith("#"):
                      if not line_stripped.startswith("# Last update:"):
                          metadata.append(line_stripped)
                  else:
                      nodes.append(line_stripped)

          alive_nodes = []
          for node in nodes:
              if check_node_ping(node):
                  alive_nodes.append(node)

          # Защита: если вдруг упали вообще все серверы, не затираем файл в ноль
          if not alive_nodes:
              print("Все узлы мертвы или превысили лимит в 1000мс. Отмена перезаписи.")
              exit(0)

          tz = pytz.timezone('Europe/Moscow')
          now = datetime.now(tz).strftime('%d.%m.%Y %H:%M MSK')

          with open(FILE_NAME, "w", encoding="utf-8") as f:
              for meta in metadata:
                  f.write(f"{meta}\n")
              f.write(f"# Last update: {now} (Strict 1000ms Check)\n\n")
              f.write("\n".join(alive_nodes))

      - name: Commit and Push Verified Changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add filtered.txt
          git commit -m "checker: removed dead nodes or ping > 1000ms" || exit 0
          git push
