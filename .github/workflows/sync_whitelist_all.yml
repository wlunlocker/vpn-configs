name: Sync Whitelist All
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Sync
        shell: python
        run: |
          import requests
          import re
          from collections import defaultdict

          sources = [
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
          ]
          limited_source = "https://raw.githubusercontent.com/ByeWhiteLists/ByeWhiteLists2/refs/heads/main/ByeWhiteLists2.txt"

          raw_nodes = []

          def clean_node(line):
              l = line.strip()
              if not l: return None
              if any(l.startswith(p) for p in ["vless://", "vmess://", "trojan://", "ss://"]):
                  return l
              return None

          for src in sources:
              try:
                  r = requests.get(src, timeout=15)
                  if r.status_code == 200:
                      for line in r.text.splitlines():
                          node = clean_node(line)
                          if node: raw_nodes.append(node)
              except: pass

          try:
              r = requests.get(limited_source, timeout=20)
              if r.status_code == 200:
                  count = 0
                  for line in r.text.splitlines():
                      if count >= 1000: break
                      node = clean_node(line)
                      if node:
                          raw_nodes.append(node)
                          count += 1
          except: pass

          countries_db = {
              "ru": ("🇷🇺", "Россия"), "de": ("🇩🇪", "Германия"), "nl": ("🇳🇱", "Нидерланды"), "fi": ("🇫🇮", "Финляндия"), 
              "us": ("🇺🇸", "США"), "fr": ("🇫🇷", "Франция"), "gb": ("🇬🇧", "Великобритания"), "uk": ("🇬🇧", "Великобритания"),
              "sg": ("🇸🇬", "Сингапур"), "jp": ("🇯🇵", "Япония"), "hk": ("🇭🇰", "Гонконг"), "tr": ("🇹🇷", "Турция"), 
              "pl": ("🇵🇱", "Польша"), "ua": ("🇺🇦", "Украина"), "kz": ("🇰🇿", "Казахстан"), "se": ("🇸🇪", "Швеция"), 
              "ch": ("🇨🇭", "Швейцария"), "it": ("🇮🇹", "Италия"), "es": ("🇪🇸", "Испания"), "ca": ("🇨🇦", "Канада"), 
              "au": ("🇦🇺", "Австралия"), "at": ("🇦🇹", "Австрия"), "cz": ("🇨🇿", "Чехия"), "bg": ("🇧🇬", "Болгария"), 
              "ro": ("🇷🇴", "Румыния"), "hu": ("🇭🇺", "Венгрия"), "ee": ("🇪🇪", "Эстония"), "lv": ("🇱🇻", "Латвия"), 
              "lt": ("🇱🇹", "Литва"), "kr": ("🇰🇷", "Южная Корея"), "in": ("🇮🇳", "Индия"), "br": ("🇧🇷", "Бразилия"), 
              "ae": ("🇦🇪", "ОАЭ"), "cy": ("🇨🇾", "Кипр"), "ge": ("🇬🇪", "Грузия"), "md": ("🇲🇩", "Молдова"),
              "tw": ("🇹🇼", "Тайвань"), "is": ("🇮🇸", "Исландия"), "ie": ("🇮🇪", "Ирландия"), "no": ("🇳🇴", "Норвегия"),
              "dk": ("🇩🇰", "Дания"), "be": ("🇧🇪", "Бельгия"), "lu": ("🇱🇺", "Люксембург"), "pt": ("🇵🇹", "Португалия"),
              "gr": ("🇬🇷", "Греция"), "il": ("🇮🇱", "Израиль"), "th": ("🇹🇭", "Таиланд"), "my": ("🇲🇾", "Малайзия"),
              "vn": ("🇻🇳", "Вьетнам"), "id": ("🇮🇩", "Индонезия"), "za": ("🇿🇦", "ЮАР"), "cl": ("🇨🇱", "Чили"),
              "ar": ("🇦🇷", "Аргентина"), "mx": ("🇲🇽", "Мексика"), "co": ("🇨🇴", "Колумбия"), "nz": ("🇳🇿", "Новая Зеландия")
          }

          def get_country_data(link):
              lower_link = link.lower()
              for code, data in countries_db.items():
                  pattern = rf"\b{code}\b|{data[1].lower()[:4]}"
                  if re.search(pattern, lower_link):
                      return data[0], data[1]
              if "#" in link:
                  old_tag = link.split('#')[-1].strip().lower()
                  for code, data in countries_db.items():
                      if code in old_tag or data[1].lower()[:4] in old_tag:
                          return data[0], data[1]
              return None, None

          seen_urls = set()
          grouped_nodes = defaultdict(list)

          for node in raw_nodes:
              base_part = node.split('#')[0].strip()
              if base_part in seen_urls:
                  continue
              
              c_flag, c_name = get_country_data(node)
              if not c_name:
                  continue
                  
              seen_urls.add(base_part)
              grouped_nodes[c_name].append((base_part, c_flag))

          final_nodes = []
          for country in sorted(grouped_nodes.keys()):
              nodes_list = grouped_nodes[country]
              counts = defaultdict(int)
              
              for base, flag in nodes_list:
                  counts[country] += 1
                  idx = counts[country]
                  final_nodes.append(f"{base}#{flag} 🏳️ WLUnlocker {country} |#{idx}")

          if not final_nodes:
              exit(1)

          with open("whitelist_all.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(final_nodes))

      - name: Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add whitelist_all.txt
          git commit -m "sync: whitelist_all.txt updated" || exit 0
          git push
