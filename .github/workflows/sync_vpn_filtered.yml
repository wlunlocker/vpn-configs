name: Sync Filtered VPN
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Filtered Sync with Pinger
        shell: python
        run: |
          import requests, datetime, socket, urllib.parse
          
          mapping = {
              "pl": ["🇵🇱", "Польша"],
              "nl": ["🇳🇱", "Нидерланды"],
              "de": ["🇩🇪", "Германия"],
              "ee": ["🇪🇪", "Эстония"],
              "ca": ["🇨🇦", "Канада"],
              "fi": ["🇫🇮", "Финляндия"],
              "ie": ["🇮🇪", "Ирландия"],
              "gb": ["🇬🇧", "Англия"],
              "fr": ["🇫🇷", "Франция"],
              "ch": ["🇨🇭", "Швейцария"]
          }
          
          def check_tcp(link, proto):
              try:
                  if proto == "ss":
                      # Формат: ss://base64@host:port или ss://host:port
                      url_str = link.split('#')[0]
                      parsed = urllib.parse.urlparse(url_str)
                      host_port = parsed.netloc.split('@')[-1]
                      host, port = host_port.split(':')
                  elif proto in ["vless", "hysteria2"]:
                      # Формат: proto://uuid@host:port
                      url_str = link.split('#')[0]
                      parsed = urllib.parse.urlparse(url_str)
                      host, port = parsed.netloc.split('@')[-1].split(':')
                  else:
                      return False
                      
                  port = int(port.split('?')[0])
                  
                  # Пробуем подключиться к порту сервера напрямую
                  s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  s.settimeout(2.0)
                  s.connect((host, port))
                  s.close()
                  return True
              except:
                  return False
          
          added_pairs = set()
          final_nodes = []
          
          try:
              res = requests.get("https://raw.githubusercontent.com/nikita29a/FreeProxyList/refs/heads/main/mirror/1.txt", timeout=15)
              if res.status_code == 200:
                  lines = [line.strip() for line in res.text.splitlines() if line.strip()]
                  
                  # Первый проход: собираем живые VLESS (до 10 штук)
                  for line in lines:
                      if not line.startswith("vless://"):
                          continue
                      
                      line_lower = line.lower()
                      found_code = None
                      for code in mapping:
                          if f"/{code}/" in line_lower or code in line_lower:
                              found_code = code
                              break
                              
                      if found_code and (found_code, "vless") not in added_pairs:
                          # Если прокси отвечает на пинг — забираем, если нет — цикл крутит дальше и ищет замену
                          if check_tcp(line, "vless"):
                              added_pairs.add((found_code, "vless"))
                              flag, country_name = mapping[found_code]
                              clean_node = line.split('#')[0].strip()
                              final_nodes.append((clean_node, flag, country_name))
                              if len(final_nodes) == 10:
                                  break
                              
                  # Второй проход: добираем живые SS и Hysteria2 (до 15 штук суммарно)
                  for line in lines:
                      if len(final_nodes) >= 15:
                          break
                          
                      proto = None
                      if line.startswith("ss://"): proto = "ss"
                      elif line.startswith("hysteria2://"): proto = "hysteria2"
                      
                      if not proto:
                          continue
                          
                      line_lower = line.lower()
                      found_code = None
                      for code in mapping:
                          if f"/{code}/" in line_lower or code in line_lower:
                              found_code = code
                              break
                              
                      if found_code and (found_code, proto) not in added_pairs:
                          if check_tcp(line, proto):
                              added_pairs.add((found_code, proto))
                              flag, country_name = mapping[found_code]
                              clean_node = line.split('#')[0].strip()
                              final_nodes.append((clean_node, flag, country_name))
          except Exception as e:
              print(f"Error: {e}")
          
          final = []
          for clean_node, flag, country_name in final_nodes:
              node_number = len(final) + 1
              formatted_node = f"{clean_node}#{flag}🏴WLUnlocker {country_name} | #{node_number}"
              final.append(formatted_node)
          
          header = f"# profile-title: 🏴Фильтрованная\n# last-update: {datetime.datetime.now().strftime('%d.%m.%H')}\n# count: {len(final)}\n"
          
          with open("filtered_vpn.txt", "w", encoding="utf-8") as f:
              f.write(header + "\n".join(final))
              
      - name: Push Changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add filtered_vpn.txt
          git commit -m "sync: filtered vpn with ping" || echo "No changes"
          git pull --rebase origin main
          git push origin main --force-with-lease
