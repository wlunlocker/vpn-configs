name: Sync Filtered VPN
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Filtered Sync with Pinger
        shell: python
        run: |
          import requests, datetime, socket, urllib.parse
          
          mapping = {
              "pl": ["🇵🇱", "Польша"], "nl": ["🇳🇱", "Нидерланды"], "de": ["🇩🇪", "Германия"],
              "ee": ["🇪🇪", "Эстония"], "ca": ["🇨🇦", "Канада"], "fi": ["🇫🇮", "Финляндия"],
              "ie": ["🇮🇪", "Ирландия"], "gb": ["🇬🇧", "Англия"], "fr": ["🇫🇷", "Франция"],
              "ch": ["🇨🇭", "Швейцария"], "us": ["🇺🇸", "США"], "at": ["🇦🇹", "Австрия"],
              "be": ["🇧🇪", "Бельгия"], "jp": ["🇯🇵", "Япония"], "se": ["🇸🇪", "Швеция"],
              "no": ["🇳🇴", "Норвегия"], "it": ["🇮🇹", "Италия"], "es": ["🇪🇸", "Испания"]
          }
          
          def check_tcp(link, proto):
              try:
                  url_str = link.split('#')[0]
                  parsed = urllib.parse.urlparse(url_str)
                  if proto == "ss":
                      host_port = parsed.netloc.split('@')[-1]
                  else:
                      host_port = parsed.netloc.split('@')[-1].split('?')[0]
                  
                  if ':' in host_port:
                      host, port = host_port.split(':')
                  else:
                      return False
                      
                  port = int(port.split('?')[0].split('/')[0])
                  s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  s.settimeout(2.0)
                  s.connect((host, port))
                  s.close()
                  return True
              except:
                  return False

          raw_lines = []
          
          try:
              r1 = requests.get("https://raw.githubusercontent.com/nikita29a/FreeProxyList/refs/heads/main/mirror/1.txt", timeout=15)
              if r1.status_code == 200:
                  raw_lines.extend([l.strip() for l in r1.text.splitlines() if l.strip()])
          except: pass

          try:
              r2 = requests.get("https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt", timeout=15)
              if r2.status_code == 200:
                  raw_lines.extend([l.strip() for l in r2.text.splitlines()[6:] if l.strip()])
          except: pass

          try:
              r3 = requests.get("https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_SS%2BAll_RUS.txt", timeout=15)
              if r3.status_code == 200:
                  raw_lines.extend([l.strip() for l in r3.text.splitlines()[6:] if l.strip()])
          except: pass

          added_pairs = set()
          final_nodes = []

          for line in raw_lines:
              if len(final_nodes) >= 30:
                  break
                  
              proto = None
              if line.startswith("vless://"): proto = "vless"
              elif line.startswith("ss://"): proto = "ss"
              elif line.startswith("hysteria2://"): proto = "hysteria2"
              
              if not proto:
                  continue
                  
              line_lower = line.lower()
              found_code = None
              for code in mapping:
                  if f"/{code}/" in line_lower or code in line_lower:
                      found_code = code
                      break
                      
              if found_code and (found_code, proto) not in added_pairs:
                  if check_tcp(line, proto):
                      added_pairs.add((found_code, proto))
                      flag, country_name = mapping[found_code]
                      clean_node = line.split('#')[0].strip()
                      final_nodes.append((clean_node, flag, country_name))

          final = []
          for clean_node, flag, country_name in final_nodes[:30]:
              node_number = len(final) + 1
              formatted_node = f"{clean_node}#{flag}🏴WLUnlocker {country_name} | #{node_number}"
              final.append(formatted_node)
          
          header = f"# profile-title: 🏴Фильтрованная\n# last-update: {datetime.datetime.now().strftime('%d.%m.%H')}\n# count: {len(final)}\n"
          
          with open("filtered_vpn.txt", "w", encoding="utf-8") as f:
              f.write(header + "\n".join(final))
              
      - name: Push Changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add filtered_vpn.txt
          git commit -m "sync: 30 filtered vpn nodes" || echo "No changes"
          git pull --rebase origin main
          git push origin main --force-with-lease
